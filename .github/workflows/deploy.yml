name: Docker Build & Hugging Face Deploy

on:
  push:
    branches:
      - main

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Backend Tests
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
          python -m pytest test_backend.py -v --tb=short

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Track frontend build
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -f frontend/dist/
          git commit -m "chore: auto-build frontend for Hugging Face Docker deployment" || echo "No changes to commit"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Image Build (Backend / Consolidated Hugging Face)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false  # We don't push the image itself, HF Spaces builds it from the repo
          tags: quantrl-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image Build (Standalone Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false 
          tags: quantrl-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Docker Space to Hugging Face
        env:
          # Add Hugging Face Token as a Repository Secret named HF_TOKEN in GitHub
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: "https://abhaygiri14:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/abhaygiri14/QuantRL" 
        run: |
          # Pushing repository context forces Hugging Face to trigger its automated Docker Builder 
          git push --force $HF_SPACE_URL main
